version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: fomoin-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: fomoin
    volumes:
      - mongodb-data:/data/db
    networks:
      - fomoin-network

  redis:
    image: redis:7-alpine
    container_name: fomoin-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - fomoin-network
    profiles:
      - with-redis

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: fomoin-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://root:password@mongodb:27017/fomoin?authSource=admin
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRES_IN: 30d
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_FROM_NUMBER: ${TWILIO_WHATSAPP_FROM_NUMBER}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ap-southeast-1
      R2_BUCKET_NAME: fomoin-uploads
      R2_ENDPOINT: ${R2_ENDPOINT}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      API_URL: http://localhost:3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
    depends_on:
      - mongodb
    networks:
      - fomoin-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: fomoin-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api
    networks:
      - fomoin-network

volumes:
  mongodb-data:
  redis-data:

networks:
  fomoin-network:
    driver: bridge